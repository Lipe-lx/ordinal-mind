<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Definição de Gradiente para um toque de profundidade sutil -->
  <defs>
    <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7931A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFAB40;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- O Traço Unificado: Ordinal (Arco) + Mind (Dobras) -->
  <path 
    d="M 50,150 
       A 80,80 0 1,1 190,150 
       C 190,120 170,100 155,100 
       C 140,100 135,125 120,125 
       C 105,125 100,100 85,100 
       C 70,100 50,120 50,150 
       Z" 
    stroke="url(#flowGradient)" 
    stroke-width="12" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    fill="none"
  />

  <!-- O Ponto de Inscrição: Representa o ID ou Endereço Taproot (O início de tudo) -->
  <circle cx="120" cy="165" r="6" fill="#F7931A">
    <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>
